# Fixed mosquitto.conf - Remove deprecated 'port' directive

# Standard MQTT listener
listener 1883 0.0.0.0

# WebSocket listener for React
listener 9001 0.0.0.0
protocol websockets

# Allow anonymous connections (for development)
allow_anonymous true

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Persistence
persistence true
persistence_location ./data/

# Optional: Log timestamps
log_timestamp true